<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Julz + Lilo | Pet UGC Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600&family=League+Spartan:wght@100;200;300;400;500;600;700;800;900&family=La+Belle+Aurore&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              stone: {
                50: '#fafaf9',
                100: '#f5f5f4',
                200: '#e7e5e4',
                300: '#d6d3d1',
                400: '#a8a29e',
                500: '#78716c',
                600: '#57534e',
                700: '#44403c',
                800: '#292524',
                900: '#1c1917',
              },
              'editorial-bg': '#F5F2EB', // Warm beige
              'editorial-text': '#1C1917', // Nearly Black (High Contrast)
              'editorial-accent': '#A08E7B', // Muted brown
            },
            fontFamily: {
              serif: ['"League Spartan"', 'sans-serif'], // Modern Bold Header
              sans: ['"Inter"', 'sans-serif'], // Clean Body
              accent: ['"La Belle Aurore"', 'cursive'], // Raw Handwritten Script
            },
            spacing: {
              '128': '32rem',
            },
            letterSpacing: {
              'mega': '0.25em',
            },
            transitionTimingFunction: {
              'premium': 'cubic-bezier(0.16, 1, 0.3, 1)',
            }
          },
        },
      }
    </script>
    <style>
      /* Smooth scrolling */
      html {
        scroll-behavior: smooth;
      }
      body {
        background-color: #F5F2EB;
        color: #1C1917;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      ::selection {
        background-color: #A08E7B;
        color: white;
      }
    </style>
    <style type="text/tailwindcss">
      @layer components {
        .t-h1 { @apply text-[clamp(40px,4.8vw,76px)] leading-[0.95] tracking-[-0.02em]; }
        .t-subtag { @apply text-[clamp(20px,2vw,26px)] leading-relaxed; }
        .t-h2 { @apply text-[clamp(48px,5.2vw,88px)] leading-[0.92] tracking-[-0.01em]; }
        .t-body { @apply text-[16px] md:text-[17px] leading-relaxed; }
        .t-eyebrow { @apply text-[13px] tracking-[0.28em] uppercase leading-none; }
        .t-nav { @apply text-xs md:text-sm uppercase tracking-[0.22em]; }
        .t-button { @apply text-xs md:text-sm uppercase tracking-[0.22em]; }

        /* GOLD STANDARD CTA SYSTEM */
        .btn-standard {
          @apply relative inline-flex items-center justify-center px-10 py-5 bg-[#A08E7B] overflow-hidden rounded-sm shadow-xl transition-all duration-700 ease-premium border border-[#A08E7B] hover:border-white text-center min-h-[64px] hover:scale-105 active:scale-95 hover:shadow-[0_0_30px_rgba(160,142,123,0.4)];
        }
        .btn-standard-overlay {
          @apply absolute inset-0 w-full h-full bg-stone-100 transform -translate-x-full transition-transform duration-700 ease-premium;
        }
        .btn-standard-text {
          @apply relative z-10 font-black text-white transition-colors duration-500 ease-premium flex items-center justify-center gap-4 whitespace-nowrap t-button;
        }
        .btn-standard-arrow {
          @apply transition-transform duration-500 ease-premium;
        }

        /* Hover States - Triggered on Button Level */
        .btn-standard:hover .btn-standard-overlay {
          @apply translate-x-0;
        }
        .btn-standard:hover .btn-standard-text {
          @apply text-stone-900;
        }
        .btn-standard:hover .btn-standard-arrow {
          @apply translate-x-2;
        }

        /* Fluid Animation Utility */
        .animate-premium {
          @apply transition-all duration-700 ease-premium;
        }
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "@google/genai": "https://esm.sh/@google/genai@^1.38.0",
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
